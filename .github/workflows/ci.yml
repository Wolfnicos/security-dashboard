name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify imports
        run: python -c "from app.services.log_parser import parse_logs, detect_bruteforce; print('Import OK')"

      - name: Run demo analysis
        run: python scripts/run_analysis.py demo

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t security-dashboard:latest .

      - name: Verify container starts
        run: |
          docker run -d --name sd-test -p 5000:5000 security-dashboard:latest
          sleep 5
          curl -sf http://localhost:5000/api/stats || exit 1
          docker stop sd-test

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: safety check -r requirements.txt || true
